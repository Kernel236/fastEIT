# Verify the package installs cleanly from source (production install, no dev deps).
# Runs on every push to dev and on PRs targeting dev or main.

name: build

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install package (production install)
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Verify import
        run: |
          python -c "from fasteit.parsers.loader import load_data; print('import ok')"
